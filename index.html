<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Display</title>

    <!-- Link CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Item Display</h1>

        <!-- Dropdown List -->
        <select id="itemSelect">
            <!-- JavaScript will create the options -->
        </select>

        <hr>

        <!-- Item Information -->
        <table>

            <tr>
                <th>ID</th>
                <td id="id"></td>
            </tr>

            <tr>
                <th>Name</th>
                <td id="name"></td>
            </tr>

            <tr>
                <th>Category</th>
                <td id="category"></td>
            </tr>

            <tr>
                <th>Inventory Amt.</th>
                <td id="inventory"></td>
            </tr>

            <tr>
                <th>List Price</th>
                <td id="price"></td>
            </tr>

        </table>

    </div>

    <!-- Link JavaScript -->
    <script src="script.js"></script>

</body>

</html>
